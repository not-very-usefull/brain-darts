<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Darts</title>
<style>
  :root{
    --bg:#12141c; --panel:#1c1f2b; --accent:#ff5d5d; --accent2:#5da9ff;
    --text:#f1f2f6; --muted:#9aa0b4; --border:#333850; --gold:#ffd166;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(circle at top, #1a1e2b, var(--bg) 60%);
    color:var(--text); min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:24px; overflow-x:hidden;
  }
  .landing{max-width:520px;width:100%;text-align:center;}
  h1{
    font-size:2.6em;margin:0 0 6px;letter-spacing:-0.5px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .tagline{color:var(--muted);margin:0 0 8px;font-size:1em;}
  .subtag{color:var(--muted);margin:0 0 8px;font-size:0.85em;opacity:0.8;}

  .hero{
    width:100%; max-width:480px; height:auto;
    border-radius:16px; margin:20px auto 8px; display:block;
    box-shadow:0 12px 32px rgba(0,0,0,0.45); border:1px solid var(--border);
  }

  .btn{
    display:inline-block; background:var(--accent); color:#fff; border:none; border-radius:10px;
    padding:16px 32px; font-size:1.15em; font-weight:700; cursor:pointer; text-decoration:none;
    margin-top:12px; transition:transform .1s, opacity .15s;
  }
  .btn:hover{ opacity:0.9; }
  .btn:active{ transform:scale(0.98); }

  footer{color:var(--muted);font-size:0.78em;text-align:center;margin-top:26px;opacity:0.75;}
</style>
</head>
<body>
<div class="landing">
  <h1>🎯 Brain Darts</h1>
  <p class="tagline">Five guesses. One brain. Zero mercy.</p>
  <p class="subtag">Warning: may cause sudden regret about skipping geography class.</p>

  <img class="hero" src="hero.jpg" alt="Two cartoon brain characters playing darts in a pub">


  <a class="btn" href="game.html">Start the darts</a>

  <footer>No login. No fuss. Just you, your mates, and Wikidata.</footer>
</div>
</body>
</html>
